<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" fill="none">
  <!-- Shield -->
  <g transform="translate(72, 2) scale(0.56)">
    <!-- Shield outline -->
    <path d="M28 0 L56 0 L56 32 Q56 52 28 62 Q0 52 0 32 L0 0 Z" fill="#1a2a5e"/>
    <!-- Red stripes -->
    <clipPath id="shield-clip">
      <path d="M28 0 L56 0 L56 32 Q56 52 28 62 Q0 52 0 32 L0 0 Z"/>
    </clipPath>
    <g clip-path="url(#shield-clip)">
      <!-- Blue canton -->
      <rect x="0" y="0" width="22" height="28" fill="#1a2a5e"/>
      <!-- Red and white stripes -->
      <rect x="22" y="0" width="34" height="5" fill="#c0272d"/>
      <rect x="22" y="5" width="34" height="5" fill="white"/>
      <rect x="22" y="10" width="34" height="5" fill="#c0272d"/>
      <rect x="22" y="15" width="34" height="5" fill="white"/>
      <rect x="22" y="20" width="34" height="5" fill="#c0272d"/>
      <rect x="22" y="25" width="34" height="5" fill="white"/>
      <!-- Lower stripes spanning full width -->
      <rect x="0" y="28" width="56" height="5" fill="#c0272d"/>
      <rect x="0" y="33" width="56" height="5" fill="white"/>
      <rect x="0" y="38" width="56" height="5" fill="#c0272d"/>
      <rect x="0" y="43" width="56" height="5" fill="white"/>
      <rect x="0" y="48" width="56" height="5" fill="#c0272d"/>
      <!-- Stars in canton -->
      <circle cx="5"  cy="5"  r="1.4" fill="white"/>
      <circle cx="11" cy="5"  r="1.4" fill="white"/>
      <circle cx="17" cy="5"  r="1.4" fill="white"/>
      <circle cx="8"  cy="10" r="1.4" fill="white"/>
      <circle cx="14" cy="10" r="1.4" fill="white"/>
      <circle cx="5"  cy="15" r="1.4" fill="white"/>
      <circle cx="11" cy="15" r="1.4" fill="white"/>
      <circle cx="17" cy="15" r="1.4" fill="white"/>
      <circle cx="8"  cy="20" r="1.4" fill="white"/>
      <circle cx="14" cy="20" r="1.4" fill="white"/>
      <circle cx="5"  cy="25" r="1.4" fill="white"/>
      <circle cx="11" cy="25" r="1.4" fill="white"/>
      <circle cx="17" cy="25" r="1.4" fill="white"/>
    </g>
    <!-- Shield border -->
    <path d="M28 0 L56 0 L56 32 Q56 52 28 62 Q0 52 0 32 L0 0 Z" fill="none" stroke="#1a2a5e" stroke-width="1.5"/>
  </g>

  <!-- NATIONAL -->
  <text x="100" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="18" fill="#1a2a5e" letter-spacing="2">NATIONAL</text>
  <!-- DEBT RELIEF -->
  <text x="100" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-weight="500" font-size="11" fill="#1a2a5e" letter-spacing="3">DEBT RELIEF</text>
</svg>
