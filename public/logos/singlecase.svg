<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#FF6B35" stroke-width="4" stroke-linecap="round">
  <!-- 8 forked arms pointing inward, at 45° intervals -->
  <!-- Top (270°) -->
  <line x1="50" y1="12" x2="50" y2="38"/>
  <line x1="50" y1="12" x2="43" y2="22"/>
  <line x1="50" y1="12" x2="57" y2="22"/>

  <!-- Top-right (315°) -->
  <line x1="70" y1="30" x2="57" y2="43"/>
  <line x1="70" y1="30" x2="60" y2="22"/>
  <line x1="70" y1="30" x2="78" y2="40"/>

  <!-- Right (0°) -->
  <line x1="88" y1="50" x2="62" y2="50"/>
  <line x1="88" y1="50" x2="78" y2="43"/>
  <line x1="88" y1="50" x2="78" y2="57"/>

  <!-- Bottom-right (45°) -->
  <line x1="70" y1="70" x2="57" y2="57"/>
  <line x1="70" y1="70" x2="78" y2="60"/>
  <line x1="70" y1="70" x2="60" y2="78"/>

  <!-- Bottom (90°) -->
  <line x1="50" y1="88" x2="50" y2="62"/>
  <line x1="50" y1="88" x2="43" y2="78"/>
  <line x1="50" y1="88" x2="57" y2="78"/>

  <!-- Bottom-left (135°) -->
  <line x1="30" y1="70" x2="43" y2="57"/>
  <line x1="30" y1="70" x2="22" y2="60"/>
  <line x1="30" y1="70" x2="40" y2="78"/>

  <!-- Left (180°) -->
  <line x1="12" y1="50" x2="38" y2="50"/>
  <line x1="12" y1="50" x2="22" y2="43"/>
  <line x1="12" y1="50" x2="22" y2="57"/>

  <!-- Top-left (225°) -->
  <line x1="30" y1="30" x2="43" y2="43"/>
  <line x1="30" y1="30" x2="22" y2="40"/>
  <line x1="30" y1="30" x2="40" y2="22"/>
</svg>
